name: Daily merged PRs digest (upstream, test/ yesterday @ 08:00 Israel)

on:
  schedule:
    # 05:30 UTC (Approx 07:30-08:30 AM Israel)
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  send_digest:
    runs-on: ubuntu-latest

    steps:
      - name: Build merged PRs digest
        id: digest
        uses: actions/github-script@v7
        with:
          script: |
            const TZ = "Asia/Jerusalem";
            const UPSTREAM_OWNER = "flightctl";
            const UPSTREAM_REPO = "flightctl";
            const FOLDER_PREFIX = "test/";

            // 1. Get Yesterday's date in Israel safely
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-US', {
              timeZone: TZ, year: 'numeric', month: 'numeric', day: 'numeric'
            });
            const parts = formatter.formatToParts(now);
            const getPart = (type) => parts.find(p => p.type === type).value;
            const localDate = new Date(getPart('year'), getPart('month') - 1, getPart('day'));
            
            const yesterday = new Date(localDate);
            yesterday.setDate(localDate.getDate() - 1);

            const ymd = `${yesterday.getFullYear()}-${String(yesterday.getMonth() + 1).padStart(2, '0')}-${String(yesterday.getDate()).padStart(2, '0')}`;

            // 2. Search GitHub
            const q = `repo:${UPSTREAM_OWNER}/${UPSTREAM_REPO} is:pr is:merged merged:${ymd}`;
            console.log(`Searching: ${q}`);

            const res = await github.rest.search.issuesAndPullRequests({ q, per_page: 100 });
            const items = res.data.items || [];
            const matched = [];

            for (const pr of items) {
              const files = await github.paginate(github.rest.pulls.listFiles, { 
                owner: UPSTREAM_OWNER, repo: UPSTREAM_REPO, pull_number: pr.number, per_page: 100 
              });
              if (files.some(f => (f.filename || "").startsWith(FOLDER_PREFIX))) {
                matched.push(pr);
              }
            }

            // 3. Prepare Email
            let body = `Merged PRs for ${UPSTREAM_OWNER}/${UPSTREAM_REPO}\n` +
                       `Folder: ${FOLDER_PREFIX}\n` +
                       `Day covered (Israel time): ${ymd}\n\n`;

            if (matched.length === 0) {
              body += "No PRs matching this folder were merged yesterday.\n";
            } else {
              for (const pr of matched) {
                body += `- #${pr.number}: ${pr.title} (${pr.user?.login})\n  ${pr.html_url}\n\n`;
              }
            }

            core.setOutput("send", "true");
            core.setOutput("subject", `🔬 flightctl test/ merges – ${ymd} (${matched.length})`);
            core.setOutput("body", body);

      - name: Send email
        if: steps.digest.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.digest.outputs.subject }}
          body: ${{ steps.digest.outputs.body }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
